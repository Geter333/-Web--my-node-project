<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Реєстрація</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        form { display: flex; flex-direction: column; width: 300px; gap: 10px; }
        input, button { padding: 10px; font-size: 16px; }
        #message { color: red; }
    </style>
</head>
<body>
    <h1>Реєстрація</h1>
    <form id="registerForm">
        <input type="text" id="name" placeholder="Ім'я" required>
        <input type="email" id="email" placeholder="Email" required>
        <input type="password" id="password" placeholder="Пароль (мін. 8 симв.)" required minlength="8">
        <input type="password" id="confirmPassword" placeholder="Підтвердіть пароль" required>
        <button type="submit">Зареєструватися</button>
    </form>
    <p id="message"></p>
    <p>Вже є акаунт? <a href="/login.html">Увійти</a></p>

    <script>
        const API_URL = 'http://localhost:3000'; // Повний URL сервера

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const body = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                confirmPassword: document.getElementById('confirmPassword').value
            };

            try {
                const response = await fetch(`${API_URL}/api/auth/register`, {
                    method: 'POST',
                    credentials: 'include', // ОБОВ'ЯЗКОВО ДЛЯ COOKIES
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });

                const data = await response.json();

                if (!response.ok) {
                    document.getElementById('message').textContent = data.message;
                    return;
                }

                document.getElementById('message').style.color = 'green';
                document.getElementById('message').textContent = 'Реєстрація успішна!';

                setTimeout(() => window.location.href = '/index.html', 1000);
            } catch (err) {
                document.getElementById('message').textContent = 'Помилка з\'єднання з сервером';
            }
        });
    </script>
</body>
</html>
