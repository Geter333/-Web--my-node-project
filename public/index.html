<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Рецепти</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .recipe-card { border: 1px solid #ccc; padding: 15px; margin-bottom: 10px; border-radius: 5px; }
        .nav { margin-bottom: 20px; }
        .nav a { margin-right: 15px; text-decoration: none; color: blue; }
        #logoutBtn { background: none; border: none; color: red; cursor: pointer; font-size: 16px; text-decoration: underline; }
    </style>
</head>
<body>
    <h1>Рецепти</h1>
    <div class="nav">
        <a href="/login.html">Увійти</a>
        <a href="/register.html">Реєстрація</a>
        <a href="/create.html">Додати рецепт</a>
        <button id="logoutBtn">Вийти</button>
    </div>

    <div id="recipeList">Завантаження...</div>

    <script>
        // Динамічно визначаємо IP/домен сервера
        const API_URL = `http://${window.location.hostname}:3000`;

        async function loadRecipes() {
            try {
                // Публічний маршрут, credentials: 'include' не обов'язковий і іноді заважає
                const response = await fetch(`${API_URL}/api/recipes`);

                const result = await response.json();
                const list = document.getElementById('recipeList');

                if (!response.ok) {
                    list.innerHTML = `<p style="color:red">Помилка: ${result.message}</p>`;
                    return;
                }

                const recipes = result.data.recipes || result.data;

                if (recipes.length === 0) {
                    list.innerHTML = '<p>Рецептів поки немає.</p>';
                    return;
                }

                list.innerHTML = recipes.map(r => `
                    <div class="recipe-card">
                        <h3>${r.title}</h3>
                        <p><strong>Кухня:</strong> ${r.cuisine} | <strong>Час:</strong> ${r.cookTime} хв</p>
                        <p><strong>Інгредієнти:</strong> ${r.ingredients.join(', ')}</p>
                        <p><em>Автор: ${r.createdBy ? r.createdBy.name : 'Невідомо'}</em></p>
                    </div>
                `).join('');

            } catch (err) {
                document.getElementById('recipeList').innerHTML = '<p style="color:red">Не вдалося завантажити дані</p>';
            }
        }

        // Обробка виходу з системи через API
        document.getElementById('logoutBtn').addEventListener('click', async () => {
            try {
                await fetch(`${API_URL}/api/auth/logout`, {
                    method: 'POST',
                    credentials: 'include'
                });
                window.location.href = '/login.html';
            } catch (err) {
                alert('Помилка виходу');
            }
        });

        loadRecipes();
    </script>
</body>
</html>
